name: Deploy Stellar Matter frontend to Hostinger

# Mirrors Stellar Nexus' deploy-nexus-frontend.yml workflow. Only the build
# target (matter.stellarinfomatica.com) and the baked-in API base URL differ.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-stellar-matter-frontend.yml'
  workflow_dispatch:

concurrency:
  group: stellar-matter-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Workspaces hoist deps to the root lockfile; web/ has no package-lock.json
          # of its own. Cache + install from the root then build the web workspace.
          cache-dependency-path: package-lock.json

      - name: Install workspace deps
        run: npm ci

      - name: Build SPA (VITE_API_BASE_URL baked in)
        working-directory: web
        env:
          # Falls back to web/.env.production if the variable is unset; explicit here so
          # CI logs make the deploy target obvious and you can override per environment.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-matter.stellarinfomatica.com' }}
        run: npm run build

      - name: Sanity-check build artefact
        run: |
          test -f web/dist/index.html || (echo "::error::web/dist/index.html missing" && exit 1)
          test -f web/dist/.htaccess  || (echo "::error::web/dist/.htaccess missing (SPA fallback)" && exit 1)
          ls -la web/dist | head -n 30

      # Hostinger shared hosting decouples FTP and SSH passwords on this account, so
      # we deploy over SSH (key auth). rsync --delete keeps Vite's hashed bundles
      # drift-free between releases.
      - name: Configure SSH for Hostinger
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.HOSTINGER_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh-keygen -lf ~/.ssh/id_ed25519
          ssh -p "${{ secrets.HOSTINGER_SSH_PORT }}" -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes -o BatchMode=yes \
              "${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }}" \
              'echo OK; id; pwd'

      - name: Deploy to Hostinger via rsync over SSH
        env:
          DEST_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          DEST_USER: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          DEST_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          # Set HOSTINGER_MATTER_SSH_PATH per-app so this can run side-by-side with Nexus
          # without overwriting the Nexus document root. Falls back to HOSTINGER_SSH_PATH
          # if you only have one site configured today.
          DEST_PATH: ${{ secrets.HOSTINGER_MATTER_SSH_PATH || secrets.HOSTINGER_SSH_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -p ${DEST_PORT} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o BatchMode=yes" \
            web/dist/ "${DEST_USER}@${DEST_HOST}:${DEST_PATH}"

      - name: Verify live site responds
        # Soft-fail: rsync deploy is what we actually care about. The live URL
        # check is informational because matter.stellarinfomatica.com may not
        # have a DNS A record yet, or DNS may still be propagating, both of
        # which would mark the run failed even though the build is in place.
        continue-on-error: true
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' https://matter.stellarinfomatica.com/ || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 3
          done
          echo "::warning::matter.stellarinfomatica.com did not return 200 (DNS not yet configured? still propagating? check Hostinger hPanel → Subdomains)"
          exit 0
